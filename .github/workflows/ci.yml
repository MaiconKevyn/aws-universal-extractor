name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python-checks:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install OCR runtime
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python modules
        run: python -m compileall functions layers/common/python/app_common scripts

      - name: Offline fixture evaluation
        run: python scripts/evaluate_fixtures.py --mode offline --output artifacts/evaluation-offline.json

      - name: LLM fixture evaluation
        if: env.OPENAI_API_KEY != ''
        run: python scripts/evaluate_fixtures.py --mode llm --sample-per-format 1 --min-accuracy 0.95 --output artifacts/evaluation-llm.json

      - name: Upload evaluation reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evaluation-reports
          path: artifacts/*.json
          if-no-files-found: ignore
